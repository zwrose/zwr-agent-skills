name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate marketplace + plugin manifests
        run: python3 .github/scripts/validate_marketplace.py

      - name: Install pytest
        run: python3 -m pip install --upgrade pytest

      - name: Install uv (test-pilot block-execution tests)
        uses: astral-sh/setup-uv@v5

      - name: Run plugin lib tests
        run: python3 -m pytest plugins/review-crew/lib/tests/ plugins/review-crew/eval/tests/ plugins/test-pilot/lib/tests/ -q
